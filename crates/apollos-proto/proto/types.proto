syntax = "proto3";

package apollos.types.v1;

enum MotionState {
  MOTION_STATE_UNSPECIFIED = 0;
  MOTION_STATE_STATIONARY = 1;
  MOTION_STATE_WALKING_SLOW = 2;
  MOTION_STATE_WALKING_FAST = 3;
  MOTION_STATE_RUNNING = 4;
}

enum DistanceCategory {
  DISTANCE_CATEGORY_UNSPECIFIED = 0;
  DISTANCE_CATEGORY_VERY_CLOSE = 1;
  DISTANCE_CATEGORY_MID = 2;
  DISTANCE_CATEGORY_FAR = 3;
}

enum NavigationMode {
  NAVIGATION_MODE_UNSPECIFIED = 0;
  NAVIGATION_MODE_NAVIGATION = 1;
  NAVIGATION_MODE_EXPLORE = 2;
  NAVIGATION_MODE_READ = 3;
  NAVIGATION_MODE_QUIET = 4;
}

enum CarryMode {
  CARRY_MODE_UNSPECIFIED = 0;
  CARRY_MODE_HAND_HELD = 1;
  CARRY_MODE_NECKLACE = 2;
  CARRY_MODE_CHEST_CLIP = 3;
  CARRY_MODE_POCKET = 4;
}

enum HumanRtcProvider {
  HUMAN_RTC_PROVIDER_UNSPECIFIED = 0;
  HUMAN_RTC_PROVIDER_TWILIO = 1;
  HUMAN_RTC_PROVIDER_LIVEKIT = 2;
}

enum CognitionLayer {
  COGNITION_LAYER_UNSPECIFIED = 0;
  COGNITION_LAYER_L1_SURVIVAL = 1;
  COGNITION_LAYER_L2_EDGE = 2;
  COGNITION_LAYER_L3_CLOUD = 3;
}

message MotionSnapshot {
  MotionState state = 1;
  float pitch = 2;
  float velocity = 3;
}

message SensorHealthSnapshot {
  float score = 1;
  repeated string flags = 2;
  bool degraded = 3;
  string source = 4;
}

message SensorUncertaintySnapshot {
  repeated float covariance_3x3 = 1;
  float innovation_norm = 2;
  string source = 3;
}

message HumanHelpRtcSession {
  HumanRtcProvider provider = 1;
  string room_name = 2;
  optional string identity = 3;
  string token = 4;
  uint32 expires_in = 5;
}
