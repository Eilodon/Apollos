syntax = "proto3";

package apollos.messages.v1;

import "types.proto";

enum ConnectionStateKind {
  CONNECTION_STATE_KIND_UNSPECIFIED = 0;
  CONNECTION_STATE_KIND_CONNECTED = 1;
  CONNECTION_STATE_KIND_RECONNECTING = 2;
  CONNECTION_STATE_KIND_DISCONNECTED = 3;
  CONNECTION_STATE_KIND_DEGRADED = 4;
}

enum SemanticCueKind {
  SEMANTIC_CUE_KIND_UNSPECIFIED = 0;
  SEMANTIC_CUE_KIND_APPROACHING_OBJECT = 1;
  SEMANTIC_CUE_KIND_SOFT_OBSTACLE = 2;
  SEMANTIC_CUE_KIND_TURNING_RECOMMENDED = 3;
  SEMANTIC_CUE_KIND_DESTINATION_NEAR = 4;
  SEMANTIC_CUE_KIND_POCKET_MODE_ACTIVE = 5;
}

message MultimodalFrameMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  optional bytes frame_jpeg = 3;
  apollos.types.v1.MotionState motion_state = 4;
  float pitch = 5;
  float velocity = 6;
  optional string user_text = 7;
  optional float yaw_delta_deg = 8;
  optional apollos.types.v1.CarryMode carry_mode = 9;
  optional bool sensor_unavailable = 10;
  optional double lat = 11;
  optional double lng = 12;
  optional float heading_deg = 13;
  optional float location_accuracy_m = 14;
  optional uint64 location_age_ms = 15;
  optional apollos.types.v1.SensorHealthSnapshot sensor_health = 16;
  optional apollos.types.v1.SensorUncertaintySnapshot sensor_uncertainty = 17;
  optional CloudLinkSnapshot cloud_link = 18;
  repeated EdgeSemanticCueMessage edge_semantic_cues = 19;
  optional VisionOdometrySnapshot vision_odometry = 20;
}

message CloudLinkSnapshot {
  bool connected = 1;
  optional float rtt_ms = 2;
  string source = 3;
}

message EdgeSemanticCueMessage {
  string cue_type = 1;
  optional string text = 2;
  float confidence = 3;
  optional float position_x = 4;
  optional float distance_m = 5;
  optional string position_clock = 6;
  optional uint32 ttl_ms = 7;
  string source = 8;
}

message VisionOdometrySnapshot {
  string source = 1;
  bool applied = 2;
  optional float optical_flow_score = 3;
  optional float variance_m2 = 4;
  optional float pose_x_m = 5;
  optional float pose_y_m = 6;
}

message AudioChunkMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  string audio_chunk_pcm16 = 3;
}

message UserCommandMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  string command = 3;
}

message HazardObservationMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  apollos.types.v1.HazardType hazard_type = 3;
  optional float bearing_x = 4;
  float distance_m = 5;
  float relative_velocity_mps = 6;
  optional float confidence = 7;
  optional string source = 8;
  optional uint32 suppress_ms = 9;
}

message SafetyDirectiveMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  optional apollos.types.v1.HazardType hazard_type = 3;
  float hazard_score = 4;
  bool hard_stop = 5;
  float haptic_intensity = 6;
  float spatial_audio_pitch_hz = 7;
  float spatial_audio_pan = 8;
  bool needs_human_assistance = 9;
  optional string reason = 10;
  bool flush_audio = 11;
}

message AssistantTextMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  string text = 3;
}

message AssistantAudioMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  optional bytes pcm24 = 3;
  optional bytes pcm16 = 4;
  optional float hazard_position_x = 5;
}

message SemanticCueMessage {
  SemanticCueKind cue = 1;
  optional float position_x = 2;
}

message ConnectionStateMessage {
  ConnectionStateKind state = 1;
  optional string detail = 2;
}

message CognitionStateMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  apollos.types.v1.CognitionLayer active_layer = 3;
  bool cloud_link_healthy = 4;
  bool edge_cognition_available = 5;
  optional float cloud_rtt_ms = 6;
  optional string reason = 7;
}

message HumanHelpSessionMessage {
  string session_id = 1;
  uint64 timestamp_ms = 2;
  optional string help_link = 3;
  apollos.types.v1.HumanHelpRtcSession rtc = 4;
}

message ClientEnvelope {
  oneof payload {
    MultimodalFrameMessage multimodal_frame = 1;
    AudioChunkMessage audio_chunk = 2;
    UserCommandMessage user_command = 3;
    HazardObservationMessage hazard_observation = 4;
  }
}

message ServerEnvelope {
  oneof payload {
    AssistantTextMessage assistant_text = 1;
    AssistantAudioMessage assistant_audio = 2;
    SafetyDirectiveMessage safety_directive = 3;
    ConnectionStateMessage connection_state = 4;
    SemanticCueMessage semantic_cue = 5;
    HumanHelpSessionMessage human_help_session = 6;
    CognitionStateMessage cognition_state = 7;
  }
}
