name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover backend/tests

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: TypeScript Check
        working-directory: frontend
        run: npx tsc --noEmit

  hardening-pass:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run hardening pass
        env:
          PYTHONPATH: backend
        run: python3 scripts/hardening_pass.py

  safety-gate:
    runs-on: ubuntu-latest
    needs: [backend-tests, hardening-pass]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run safety regression gate
        env:
          PYTHONPATH: backend
        run: python3 scripts/safety_regression_gate.py --min-recall 0.80 --max-false-stop 0.34 --budget-ms 100

  terraform-plan:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: [backend-tests, hardening-pass, safety-gate, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_container_image: ${{ secrets.BACKEND_IMAGE_URI }}
        run: terraform plan -out tfplan

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.BACKEND_IMAGE_URI }} backend/
          docker push ${{ secrets.BACKEND_IMAGE_URI }}
      - name: Deploy to Cloud Run
        env:
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.OIDC_AUDIENCE }}
          OIDC_BROKER_SIGNING_KEY: ${{ secrets.OIDC_BROKER_SIGNING_KEY }}
          HUMAN_HELP_SIGNING_KEY: ${{ secrets.HUMAN_HELP_SIGNING_KEY }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
        run: |
          if [ -z "$OIDC_ISSUER" ] || [ -z "$OIDC_AUDIENCE" ] || [ -z "$OIDC_BROKER_SIGNING_KEY" ] || [ -z "$HUMAN_HELP_SIGNING_KEY" ]; then
            echo "Missing required secret: OIDC_ISSUER, OIDC_AUDIENCE, OIDC_BROKER_SIGNING_KEY, or HUMAN_HELP_SIGNING_KEY"
            exit 1
          fi
          gcloud run deploy aria-backend \
            --image ${{ secrets.BACKEND_IMAGE_URI }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --update-env-vars APP_ENV=production,WS_AUTH_MODE=oidc,OIDC_ISSUER=$OIDC_ISSUER,OIDC_AUDIENCE=$OIDC_AUDIENCE,OIDC_BROKER_ENABLED=1,OIDC_BROKER_SIGNING_KEY=$OIDC_BROKER_SIGNING_KEY,HUMAN_FALLBACK_ENABLED=1,HUMAN_HELP_SIGNING_KEY=$HUMAN_HELP_SIGNING_KEY,ENABLE_DEV_ENDPOINTS=0,CORS_ALLOW_ORIGINS=${FRONTEND_ORIGIN}
