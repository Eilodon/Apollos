name: Rust Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "crates/**"
      - "native/**"
      - "scripts/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (ml feature)
        run: cargo clippy -p apollos-core --features ml --all-targets -- -D warnings

  terraform-plan:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: [rust-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_container_image: ${{ secrets.BACKEND_IMAGE_URI }}
        run: terraform plan -out tfplan

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.BACKEND_IMAGE_URI }} .
          docker push ${{ secrets.BACKEND_IMAGE_URI }}

      - name: Deploy Rust server to Cloud Run
        env:
          OIDC_ISSUER: ${{ secrets.OIDC_ISSUER }}
          OIDC_AUDIENCE: ${{ secrets.OIDC_AUDIENCE }}
          OIDC_JWKS_URL: ${{ secrets.OIDC_JWKS_URL }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
        run: |
          if [ -z "$OIDC_ISSUER" ] || [ -z "$OIDC_AUDIENCE" ] || [ -z "$OIDC_JWKS_URL" ]; then
            echo "Missing required secret: OIDC_ISSUER, OIDC_AUDIENCE, OIDC_JWKS_URL"
            exit 1
          fi

          gcloud run deploy apollos-server \
            --image ${{ secrets.BACKEND_IMAGE_URI }} \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --max-instances=1 \
            --update-env-vars APP_ENV=production,ENABLE_GEMINI_LIVE=1,WS_AUTH_MODE=oidc_broker,OIDC_REQUIRE_STRICT=1,OIDC_ISSUER=$OIDC_ISSUER,OIDC_AUDIENCE=$OIDC_AUDIENCE,OIDC_JWKS_URL=$OIDC_JWKS_URL,USE_FIRESTORE=1,FIRESTORE_REQUIRED=1,TWILIO_REQUIRED=1,SINGLE_INSTANCE_ONLY=1,ENABLE_DEV_ENDPOINTS=0,CORS_ALLOW_ORIGINS=${FRONTEND_ORIGIN}
